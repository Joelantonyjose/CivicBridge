{% extends "base.html" %}

{% block content %}

<h1>Reported Issues</h1>

{% for report in reports %}

<div>
    <h3>{{ report.title }}</h3>

    <p><strong>Name:</strong> {{ report.name }}</p>

    <p><strong>Location:</strong> {{ report.location }}</p>

    <p><strong>Description:</strong> {{ report.description }}</p>

    <hr>
</div>

{% endfor %}

{% endblock %}
